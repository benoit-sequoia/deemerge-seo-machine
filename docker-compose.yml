services:
  app:
    container_name: deemerge_seo_app
    build:
      context: https://github.com/benoit-sequoia/deemerge-seo-machine.git#main:
      dockerfile: docker/Dockerfile
    volumes:
      - deemerge_seo_data:/data
      - deemerge_seo_logs:/logs
      - deemerge_seo_backups:/backups
    restart: unless-stopped
    command: ["sleep", "infinity"]

volumes:
  deemerge_seo_data:
  deemerge_seo_logs:
  deemerge_seo_backups:
